{% extends 'base.html' %}

{% block content %}
<style>
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        border: none;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }
    .login-card:hover {
        transform: translateY(-5px);
    }
    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px;
        text-align: center;
    }
    .login-body {
        padding: 30px;
        background: white;
    }
    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
    }
    .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
    }
    .btn-login:hover {
        background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .input-group-text {
        background-color: #f8f9fa;
        border-color: #ced4da;
        border-right: none;
    }
    .form-control {
        border-left: none;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
    }
</style>

<div class="login-container">
    <div class="card login-card shadow">
        <div class="login-header">
            <i class="bi bi-box-seam display-4 text-white"></i>
            <h3 class="text-white mt-2 fw-bold">Django CRM</h3>
            <p class="text-white-50 mb-0">Ingresa tus credenciales</p>
        </div>
        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                        {% if message.tags == 'success' %}
                            <i class="bi bi-check-circle-fill me-2"></i>
                        {% else %}
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {% endif %}
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="username" class="form-label fw-semibold"><i class="bi bi-person me-1"></i>Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Ingresa tu usuario" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold"><i class="bi bi-lock me-1"></i>Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-login w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                    </button>
                </div>
            </form>
            <hr class="my-4">
            <p class="text-center mb-0">¿No tienes cuenta? <a href="{% url 'register' %}" class="text-primary fw-semibold"><i class="bi bi-person-plus me-1"></i>Crear cuenta</a></p>
        </div>
    </div>
</div>
{% endblock %}
